<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator - Easy Tutorials</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
  <div class="container">
    <h1>Generate a<br><span>Random Password</span></h1>
    <div class="length-box">
    <label>Password Length: <span id="lengthValue">12</span></label>

    <input
        type="range"
        id="lengthSlider"
        min="6"
        max="30"
        value="12">
</div>
    <div class="display">
    <input type="text" id="password" placeholder="Password">
    <img src="https://img.icons8.com/fluency/48/copy.png" onclick="copyPassword()">
</div>
    <button onclick="createPassword()">
    <img src="https://img.icons8.com/color/48/lightning-bolt.png" >
    Generate Password
</button>
  </div>  
<script src="style.js"></script>
</body>
</html>
